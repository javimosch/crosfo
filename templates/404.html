<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Crosfo</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Crosfo homepage.">
    <meta property="og:title" content="404 - Page Not Found | Crosfo">
    <meta property="og:description" content="The page you're looking for doesn't exist.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300B4D8'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00B4D8',
                        'primary-hover': '#0095B8',
                        'primary-subtle': 'rgba(0, 180, 216, 0.1)',
                        bg: {
                            primary: '#FAFAFA',
                            secondary: '#F5F5F5',
                            tertiary: '#E5E5E5',
                            elevated: '#FFFFFF',
                        },
                        text: {
                            primary: '#1A1A1A',
                            secondary: '#666666',
                            tertiary: '#999999',
                        },
                    },
                    fontFamily: {
                        sans: ['SF Pro Display', 'Geist Sans', 'Helvetica Neue', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['Geist Mono', 'SF Mono', 'Menlo', 'Consolas', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-bg-primary text-text-primary min-h-screen flex items-center justify-center">
    <div class="error-container text-center p-16 max-w-2xl animate-fade-in">
        <div class="error-illustration mb-8 relative">
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-primary-subtle rounded-full animate-pulse"></div>
            <span class="error-icon text-8xl relative z-10 inline-block">🔍</span>
        </div>
        <h1 class="error-code text-9xl font-bold tracking-tighter bg-gradient-to-r from-primary to-primary-hover bg-clip-text text-transparent mb-4">404</h1>
        <h2 class="error-title text-3xl font-semibold tracking-wide mb-4">Page Not Found</h2>
        <p class="error-description text-base text-text-secondary mb-8 leading-relaxed">
            We couldn't find the page you're looking for. It might have been moved, deleted, or never existed in the first place.
        </p>
        <div class="error-actions flex gap-4 justify-center flex-wrap">
            <a href="/" class="btn bg-text-primary text-bg-elevated px-6 py-3 rounded-lg font-medium hover-lift active-press">Go to Homepage</a>
            <a href="javascript:history.back()" class="btn btn-secondary bg-bg-elevated text-text-primary border border-bg-tertiary px-6 py-3 rounded-lg font-medium hover:bg-bg-secondary hover-lift active-press">Go Back</a>
        </div>
    </div>
</body>
</html>
