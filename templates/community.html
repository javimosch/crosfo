<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crosfo - Community</title>
    <meta name="description" content="Join a Crosfo community and cross-follow with fellow entrepreneurs.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300B4D8'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00B4D8',
                        'primary-hover': '#0095B8',
                        'primary-subtle': 'rgba(0, 180, 216, 0.1)',
                        bg: {
                            primary: '#FAFAFA',
                            secondary: '#F5F5F5',
                            tertiary: '#E5E5E5',
                            elevated: '#FFFFFF',
                        },
                        text: {
                            primary: '#1A1A1A',
                            secondary: '#666666',
                            tertiary: '#999999',
                        },
                        error: '#D32F2F',
                        'error-bg': '#FFF3F3',
                        'error-border': '#FFC7C7',
                    },
                    fontFamily: {
                        sans: ['SF Pro Display', 'Geist Sans', 'Helvetica Neue', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['Geist Mono', 'SF Mono', 'Menlo', 'Consolas', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-bg-primary text-text-primary leading-relaxed min-h-screen">
    <a href="#main-content" class="skip-to-content">Skip to main content</a>
    <div class="container max-w-6xl mx-auto p-12">
        <nav class="flex justify-between items-center mb-12 pb-6 border-b border-bg-tertiary">
            <div class="flex items-center gap-4">
                <a href="/" class="text-lg font-semibold tracking-wide bg-gradient-to-r from-primary to-primary-hover bg-clip-text text-transparent">Crosfo</a>
                <a href="/" class="text-sm text-text-secondary hover:text-primary transition-colors">← Back to communities</a>
                <a href="/stats" class="text-sm text-text-secondary hover:text-primary transition-colors">Stats</a>
            </div>
            <div class="auth-section flex gap-2 items-center" id="authSection">
                <input type="text" class="auth-input px-3 py-2 border border-bg-tertiary rounded text-sm w-36 bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" id="nicknameInput" placeholder="Telegram nickname (@username)">
                <input type="password" class="auth-input password px-3 py-2 border border-bg-tertiary rounded text-sm w-28 bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" id="passwordInput" placeholder="Password">
                <button class="auth-btn px-3 py-2 bg-text-primary text-bg-elevated border-none rounded text-sm font-medium cursor-pointer hover-lift active-press" id="loginBtn" onclick="handleAuth()">Login/Register</button>
                <span class="auth-status text-xs text-text-secondary" id="authStatus"></span>
            </div>
            <div class="user-info flex gap-2 items-center hidden" id="userInfo">
                <span class="text-sm text-text-secondary">Welcome, <span id="displayNickname"></span></span>
                <button class="auth-btn px-3 py-2 bg-text-primary text-bg-elevated border-none rounded text-sm font-medium cursor-pointer hover-lift active-press" onclick="handleLogout()">Logout</button>
            </div>
        </nav>

        <main id="main-content">
            <div class="community-header mb-12">
                <h1 class="community-name text-5xl font-bold tracking-tighter mb-2" id="communityName">Loading...</h1>
                <p class="community-description text-lg text-text-secondary" id="communityDescription"></p>
                <button class="btn bg-text-primary text-bg-elevated px-4 py-2 border-none rounded text-sm font-medium cursor-pointer hover-lift active-press hidden mt-4" id="editCommunityBtn" onclick="openEditCommunityModal()">Edit Community</button>
            </div>

            <section>
                <div class="section-header flex justify-between items-center mb-8">
                    <h2 class="section-title text-2xl font-bold tracking-wide">Entries</h2>
                    <button class="btn bg-text-primary text-bg-elevated px-4 py-2 border-none rounded text-sm font-medium cursor-pointer hover-lift active-press" onclick="openCreateEntryModal()">Add Your Entry</button>
                </div>
                <div id="entriesList" class="entries-list flex flex-col gap-6">
                    <!-- Entries will be loaded here -->
                </div>
            </section>
        </main>

        <footer class="footer mt-12 pt-6 border-t border-bg-tertiary">
            <p class="text-sm text-text-secondary">&copy; 2024 Crosfo. Built for solo entrepreneurs.</p>
            <div class="footer-links flex gap-4 mt-2 flex-wrap">
                <a href="/privacy" class="text-sm text-text-secondary hover:text-primary transition-colors">Privacy Policy</a>
                <a href="/terms" class="text-sm text-text-secondary hover:text-primary transition-colors">Terms of Service</a>
            </div>
        </footer>
    </div>

    <div class="modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" id="createEntryModal">
        <div class="modal-content bg-bg-elevated rounded-xl p-6 max-w-lg w-full mx-4 shadow-lg">
            <h3 class="modal-title text-xl font-bold tracking-wide mb-6">Add Your Entry</h3>
            <div class="form-group mb-4">
                <label class="form-label block text-sm font-medium mb-2">Nickname</label>
                <input type="text" class="form-input w-full px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" id="entryNickname" placeholder="Your nickname">
            </div>
            <div class="form-group mb-4">
                <label class="form-label block text-sm font-medium mb-2">Social Links</label>
                <div id="linksInputs" class="links-inputs flex flex-col gap-2">
                    <div class="link-input-row flex gap-2">
                        <input type="text" class="form-input flex-1 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" placeholder="Platform (e.g., Twitter, GitHub)">
                        <input type="url" class="form-input flex-2 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" placeholder="URL">
                    </div>
                </div>
                <button class="add-link-btn text-sm text-primary hover:underline mt-3" onclick="addLinkInput()">+ Add Link</button>
            </div>
            <div class="form-actions flex gap-3 justify-end">
                <button class="btn bg-text-primary text-bg-elevated px-4 py-2 border-none rounded text-sm font-medium cursor-pointer hover-lift active-press" onclick="createEntry()">Submit Entry</button>
                <button class="btn btn-secondary bg-bg-elevated text-text-primary border border-bg-tertiary px-4 py-2 rounded text-sm font-medium cursor-pointer hover:bg-bg-secondary hover-lift active-press" onclick="closeCreateEntryModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal user-entries-modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" id="userEntriesModal">
        <div class="modal-content bg-bg-elevated rounded-xl p-6 max-w-2xl w-full mx-4 shadow-lg max-h-[80vh] overflow-y-auto">
            <h3 class="modal-title text-xl font-bold tracking-wide mb-6">Entries by <span id="userEntriesNickname"></span></h3>
            <div id="userEntriesList"></div>
            <div class="form-actions flex gap-3 justify-end mt-6">
                <button class="btn btn-secondary bg-bg-elevated text-text-primary border border-bg-tertiary px-4 py-2 rounded text-sm font-medium cursor-pointer hover:bg-bg-secondary hover-lift active-press" onclick="closeUserEntriesModal()">Close</button>
            </div>
        </div>
    </div>

    <div class="edit-modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" id="editEntryModal">
        <div class="edit-modal-content bg-bg-elevated rounded-xl p-6 max-w-lg w-full mx-4 shadow-lg">
            <h3 class="edit-modal-header text-xl font-bold tracking-wide mb-6">Edit Your Entry</h3>
            <div class="form-group mb-4">
                <label class="form-label block text-sm font-medium mb-2">Nickname</label>
                <input type="text" class="form-input w-full px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" id="editEntryNickname" placeholder="Your nickname" readonly>
            </div>
            <div class="form-group mb-4">
                <label class="form-label block text-sm font-medium mb-2">Social Links</label>
                <div id="editLinksInputs" class="links-inputs flex flex-col gap-2">
                    <!-- Links will be loaded here -->
                </div>
                <button class="add-link-btn text-sm text-primary hover:underline mt-3" onclick="addEditLinkInput()">+ Add Link</button>
            </div>
            <div class="form-actions flex gap-3 justify-end">
                <button class="btn bg-text-primary text-bg-elevated px-4 py-2 border-none rounded text-sm font-medium cursor-pointer hover-lift active-press" onclick="saveEditedEntry()">Save Changes</button>
                <button class="btn btn-secondary bg-bg-elevated text-text-primary border border-bg-tertiary px-4 py-2 rounded text-sm font-medium cursor-pointer hover:bg-bg-secondary hover-lift active-press" onclick="closeEditEntryModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="edit-modal fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden" id="editCommunityModal">
        <div class="edit-modal-content bg-bg-elevated rounded-xl p-6 max-w-md w-full mx-4 shadow-lg">
            <h3 class="edit-modal-header text-xl font-bold tracking-wide mb-6">Edit Community</h3>
            <div class="form-group mb-4">
                <label class="form-label block text-sm font-medium mb-2">Community Name</label>
                <input type="text" class="form-input w-full px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" id="editCommunityName" placeholder="Community name">
            </div>
            <div class="form-group mb-4">
                <label class="form-label block text-sm font-medium mb-2">Description</label>
                <textarea class="form-input w-full px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all min-h-[100px]" id="editCommunityDescription" placeholder="Community description" rows="3"></textarea>
            </div>
            <div class="form-group mb-4">
                <label class="form-label block text-sm font-medium mb-2">Your Password</label>
                <input type="password" class="form-input w-full px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" id="editCommunityPassword" placeholder="Enter your password to save changes">
            </div>
            <div class="form-actions flex gap-3 justify-end">
                <button class="btn bg-text-primary text-bg-elevated px-4 py-2 border-none rounded text-sm font-medium cursor-pointer hover-lift active-press" onclick="saveCommunityChanges()">Save Changes</button>
                <button class="btn btn-secondary bg-bg-elevated text-text-primary border border-bg-tertiary px-4 py-2 rounded text-sm font-medium cursor-pointer hover:bg-bg-secondary hover-lift active-press" onclick="closeEditCommunityModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="admin-section hidden mt-8 p-6 bg-bg-secondary rounded-lg" id="adminSection">
        <div class="admin-header text-lg font-bold mb-4">Community Admins</div>
        <div class="admin-list flex flex-wrap gap-2 mb-4" id="adminList"></div>
        <div class="add-admin-form flex gap-2">
            <input type="text" class="form-input flex-1 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" id="addAdminNickname" placeholder="Enter nickname to add as admin">
            <input type="password" class="form-input w-36 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" id="addAdminPassword" placeholder="Your password">
            <button class="btn bg-text-primary text-bg-elevated px-4 py-2 border-none rounded text-sm font-medium cursor-pointer hover-lift active-press" onclick="addAdmin()">Add Admin</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let isAuthenticated = false;
        let currentCommunity = null;
        let isAdmin = false;

        const exampleUsers = [
            'alice_dev', 'bob_design', 'charlie_code', 'diana_startup', 'eve_writer',
            'frank_tech', 'grace_ai', 'henry_web', 'iris_data', 'jack_mobile',
            'kate_cloud', 'leo_ml', 'maya_design', 'noah_backend', 'olivia_product',
            'peter_devops', 'quinn_security', 'rachel_frontend', 'sam_fullstack'
        ];

        function isExampleUser(nickname) {
            return exampleUsers.includes(nickname);
        }

        function updateAuthUI() {
            const authSection = document.getElementById('authSection');
            const userInfo = document.getElementById('userInfo');
            const displayNickname = document.getElementById('displayNickname');

            if (isAuthenticated && currentUser) {
                authSection.classList.add('hidden');
                userInfo.classList.remove('hidden');
                userInfo.classList.add('flex');
                displayNickname.textContent = currentUser;
            } else {
                authSection.classList.remove('hidden');
                userInfo.classList.add('hidden');
                userInfo.classList.remove('flex');
            }
        }

        function handleLogout() {
            localStorage.removeItem('ffaf_nickname');
            localStorage.removeItem('ffaf_authenticated');
            currentUser = null;
            isAuthenticated = false;
            document.getElementById('nicknameInput').value = '';
            document.getElementById('passwordInput').value = '';
            updateAuthUI();
        }

        async function handleAuth() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const authStatus = document.getElementById('authStatus');

            if (!nickname) {
                authStatus.textContent = 'Nickname required';
                return;
            }
            if (!password) {
                authStatus.textContent = 'Password required';
                return;
            }

            authStatus.textContent = 'Authenticating...';

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('ffaf_nickname', nickname);
                    localStorage.setItem('ffaf_authenticated', 'true');
                    currentUser = nickname;
                    isAuthenticated = true;
                    authStatus.textContent = '';
                    document.getElementById('nicknameInput').value = '';
                    document.getElementById('passwordInput').value = '';
                    updateAuthUI();
                    loadCommunity();
                } else {
                    authStatus.textContent = data.error || 'Authentication failed';
                }
            } catch (error) {
                authStatus.textContent = 'Connection error';
            }
        }

        async function loadCommunity() {
            const pathParts = window.location.pathname.split('/').filter(Boolean);
            const communityName = pathParts[1] || '';
            currentCommunity = communityName;

            try {
                const response = await fetch(`/api/community/${encodeURIComponent(communityName)}`);
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('communityName').textContent = data.name;
                    document.getElementById('communityDescription').textContent = data.description || '';
                    document.title = `${data.name} - Crosfo`;
                    loadEntries();
                    checkAdmin();
                } else {
                    document.getElementById('communityName').textContent = 'Community not found';
                    document.getElementById('communityDescription').textContent = '';
                }
            } catch (error) {
                document.getElementById('communityName').textContent = 'Error loading community';
            }
        }

        async function loadEntries() {
            const entriesList = document.getElementById('entriesList');
            try {
                const response = await fetch(`/api/community/${encodeURIComponent(currentCommunity)}`);
                const data = await response.json();
                const entries = data.entries || [];

                if (entries.length === 0) {
                    entriesList.innerHTML = '<p class="text-text-secondary text-center py-12">No entries yet. Be the first to add yours!</p>';
                    return;
                }

                entriesList.innerHTML = entries.map(entry => {
                    const isOwner = currentUser && entry.nickname === currentUser;
                    return renderEntryCard(entry, isOwner);
                }).join('');
            } catch (error) {
                entriesList.innerHTML = '<p class="text-error text-center py-12">Failed to load entries</p>';
            }
        }

        function renderEntryCard(entry, isOwner) {
            const telegramUrl = `https://web.telegram.org/k/#@${entry.nickname}`;
            const isExample = isExampleUser(entry.nickname);
            return `
                <div class="entry-card bg-bg-elevated border border-bg-tertiary rounded-lg p-6 ${isOwner ? 'border-l-4 border-l-primary' : ''} hover-lift transition-all">
                    <div class="entry-header flex justify-between items-start mb-4">
                        <div class="entry-nickname ${entry.nickname ? 'cursor-pointer' : ''}">
                            <a href="${telegramUrl}" target="_blank" rel="noopener" class="text-text-primary hover:text-primary transition-colors font-medium">${escapeHtml(entry.nickname || 'Anonymous')}</a>
                            ${isExample ? '<span class="ml-2 text-xs bg-bg-secondary text-text-secondary px-2 py-1 rounded">EXAMPLE</span>' : ''}
                        </div>
                        <div class="entry-meta text-xs text-text-secondary">${formatDate(entry.created_at)}</div>
                        ${isOwner ? `
                            <div class="entry-actions flex gap-2">
                                <button class="btn bg-bg-secondary text-text-primary border border-bg-tertiary px-3 py-1 rounded text-xs font-medium cursor-pointer hover:bg-bg-tertiary" onclick="openEditEntryModal(${entry.id})">Edit</button>
                                <button class="btn bg-error text-white px-3 py-1 rounded text-xs font-medium cursor-pointer hover-lift" onclick="deleteEntry(${entry.id})">Delete</button>
                            </div>
                        ` : ''}
                    </div>
                    <div class="links-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        ${entry.links.map(link => {
                            const isOwnLink = isOwner;
                            return `
                            <div class="link-card bg-bg-secondary border border-bg-tertiary rounded-lg p-4 hover-lift transition-all">
                                <div class="link-platform text-xs font-semibold uppercase tracking-widest text-text-secondary mb-2">${escapeHtml(link.platform)}</div>
                                <div class="link-url text-sm break-all mb-3">
                                    <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener" class="text-text-primary hover:text-primary transition-colors">${escapeHtml(link.url)}</a>
                                </div>
                                <div class="link-actions flex justify-between items-center">
                                    <div class="thumbs-count text-xs text-text-secondary">
                                        <strong>${link.thumbs_count || 0}</strong> thumbs up
                                    </div>
                                    ${!isOwnLink ? `
                                        <button class="btn bg-text-primary text-bg-elevated px-3 py-1 rounded text-xs font-medium cursor-pointer hover-lift active-press" onclick="thumbUp(${link.id})">👍 Thumbs Up</button>
                                    ` : `
                                        <span class="btn bg-bg-tertiary text-text-tertiary px-3 py-1 rounded text-xs cursor-not-allowed" title="You cannot thumbs up your own link">👍 Own link</span>
                                    `}
                                </div>
                                <div class="thumbs-list hidden mt-3 pt-3 border-t border-bg-tertiary" id="thumbs-list-${link.id}"></div>
                            </div>
                        `}).join('')}
                    </div>
                    ${renderVoterBreakdown(entry)}
                </div>
            `;
        }

        function totalThumbs(entry) {
            return (entry.links || []).reduce((s, l) => s + (l.thumbs_count || 0), 0);
        }

        function renderVoterBreakdown(entry) {
            const total = totalThumbs(entry);
            if (total === 0) return '';
            const communityName = window.location.pathname.split('/')[2] || '';
            return `
                <div class="voter-breakdown mt-4 pt-3 border-t border-bg-tertiary">
                    <button class="voter-toggle bg-none border-none cursor-pointer text-xs text-text-secondary flex items-center gap-1 transition-colors hover:text-primary" onclick="toggleVoterBreakdown(this, ${entry.id}, '${communityName}')">
                        <span class="toggle-icon">▸</span>
                        <span>${total} thumbs up — see who helped</span>
                    </button>
                    <div class="voter-list hidden flex flex-wrap gap-2 mt-3" id="voter-list-${entry.id}"></div>
                </div>
            `;
        }

        async function toggleVoterBreakdown(btn, entryId, community) {
            const list = document.getElementById(`voter-list-${entryId}`);
            const icon = btn.querySelector('.toggle-icon');
            if (!list.classList.contains('hidden')) {
                list.classList.add('hidden');
                icon.textContent = '▸';
                return;
            }
            icon.textContent = '▾';
            if (!list.dataset.loaded) {
                list.innerHTML = '<span class="text-xs text-text-tertiary">Loading…</span>';
                list.classList.remove('hidden');
                try {
                    const res = await fetch(`/api/thumbs-breakdown/${community}/${entryId}`);
                    const voters = await res.json();
                    if (!voters || voters.length === 0) {
                        list.innerHTML = '<span class="text-xs text-text-tertiary">No votes yet</span>';
                    } else {
                        list.innerHTML = voters.map(v => `
                            <a class="voter-pill inline-flex items-center gap-1 bg-bg-secondary border border-bg-tertiary rounded-full px-2.5 py-1 text-xs text-text-primary hover:bg-primary-subtle hover:border-primary hover:text-primary transition-all" href="/c/${community}/user/${encodeURIComponent(v.nickname)}">
                                ${escapeHtml(v.nickname)}<span class="voter-count font-semibold text-primary">×${v.count}</span>
                            </a>
                        `).join('');
                    }
                    list.dataset.loaded = '1';
                } catch(e) {
                    list.innerHTML = '<span class="text-xs text-error">Failed to load</span>';
                }
            } else {
                list.classList.remove('hidden');
            }
        }

        function openCreateEntryModal() {
            if (!isAuthenticated) {
                alert('Please login first');
                return;
            }
            document.getElementById('entryNickname').value = currentUser;
            document.getElementById('createEntryModal').classList.remove('hidden');
        }

        function closeCreateEntryModal() {
            document.getElementById('createEntryModal').classList.add('hidden');
            document.getElementById('entryNickname').value = '';
            document.getElementById('linksInputs').innerHTML = `
                <div class="link-input-row flex gap-2">
                    <input type="text" class="form-input flex-1 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" placeholder="Platform (e.g., Twitter, GitHub)">
                    <input type="url" class="form-input flex-2 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" placeholder="URL">
                </div>
            `;
        }

        function addLinkInput() {
            const container = document.getElementById('linksInputs');
            const newRow = document.createElement('div');
            newRow.className = 'link-input-row flex gap-2';
            newRow.innerHTML = `
                <input type="text" class="form-input flex-1 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" placeholder="Platform">
                <input type="url" class="form-input flex-2 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" placeholder="URL">
                <button class="btn bg-error text-white px-2 py-1 rounded text-xs cursor-pointer hover-lift" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(newRow);
        }

        async function createEntry() {
            const nickname = document.getElementById('entryNickname').value.trim();
            const linkRows = document.querySelectorAll('#linksInputs .link-input-row');
            const links = [];

            linkRows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                const platform = inputs[0].value.trim();
                const url = inputs[1].value.trim();
                if (platform && url) {
                    links.push({ platform, url });
                }
            });

            if (!nickname) {
                alert('Nickname is required');
                return;
            }
            if (links.length === 0) {
                alert('At least one link is required');
                return;
            }

            try {
                const response = await fetch('/api/entry', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ community_name: currentCommunity, nickname, links })
                });

                if (response.ok) {
                    closeCreateEntryModal();
                    loadEntries();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to create entry');
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        async function thumbUp(linkId) {
            if (!isAuthenticated) {
                alert('Please login first');
                return;
            }

            try {
                const response = await fetch('/api/thumb-up', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ link_id: linkId, nickname: currentUser })
                });

                if (response.ok) {
                    loadEntries();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to thumbs up');
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        async function deleteEntry(entryId) {
            if (!confirm('Are you sure you want to delete this entry?')) return;

            try {
                const response = await fetch('/api/entry/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entry_id: entryId, nickname: currentUser })
                });

                if (response.ok) {
                    loadEntries();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to delete entry');
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        async function openEditEntryModal(entryId) {
            try {
                const response = await fetch(`/api/community/${encodeURIComponent(currentCommunity)}`);
                const data = await response.json();
                const entries = data.entries || [];
                const entry = entries.find(e => e.id === entryId);

                if (entry) {
                    document.getElementById('editEntryNickname').value = entry.nickname;
                    const container = document.getElementById('editLinksInputs');
                    container.innerHTML = entry.links.map(link => `
                        <div class="link-input-row flex gap-2">
                            <input type="text" class="form-input flex-1 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" value="${escapeHtml(link.platform)}" placeholder="Platform">
                            <input type="url" class="form-input flex-2 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" value="${escapeHtml(link.url)}" placeholder="URL">
                            <button class="btn bg-error text-white px-2 py-1 rounded text-xs cursor-pointer hover-lift" onclick="this.parentElement.remove()">×</button>
                        </div>
                    `).join('');
                    document.getElementById('editEntryModal').dataset.entryId = entryId;
                    document.getElementById('editEntryModal').classList.remove('hidden');
                }
            } catch (error) {
                alert('Failed to load entry');
            }
        }

        function closeEditEntryModal() {
            document.getElementById('editEntryModal').classList.add('hidden');
        }

        function addEditLinkInput() {
            const container = document.getElementById('editLinksInputs');
            const newRow = document.createElement('div');
            newRow.className = 'link-input-row flex gap-2';
            newRow.innerHTML = `
                <input type="text" class="form-input flex-1 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" placeholder="Platform">
                <input type="url" class="form-input flex-2 px-3 py-2 border border-bg-tertiary rounded bg-bg-elevated text-text-primary focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-subtle transition-all" placeholder="URL">
                <button class="btn bg-error text-white px-2 py-1 rounded text-xs cursor-pointer hover-lift" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(newRow);
        }

        async function saveEditedEntry() {
            const entryId = parseInt(document.getElementById('editEntryModal').dataset.entryId);
            const linkRows = document.querySelectorAll('#editLinksInputs .link-input-row');
            const links = [];

            linkRows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                const platform = inputs[0].value.trim();
                const url = inputs[1].value.trim();
                if (platform && url) {
                    links.push({ platform, url });
                }
            });

            try {
                const response = await fetch('/api/entry/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ entry_id: entryId, nickname: currentUser, links })
                });

                if (response.ok) {
                    closeEditEntryModal();
                    loadEntries();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to update entry');
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        async function checkAdmin() {
            try {
                const response = await fetch(`/api/community-admins/${encodeURIComponent(currentCommunity)}`);
                const data = await response.json();

                if (response.ok && data.admins && data.admins.includes(currentUser)) {
                    isAdmin = true;
                    document.getElementById('editCommunityBtn').classList.remove('hidden');
                    document.getElementById('adminSection').classList.remove('hidden');
                    renderAdminList(data.admins);
                }
            } catch (error) {
                console.error('Failed to check admin status');
            }
        }

        function renderAdminList(admins) {
            const adminList = document.getElementById('adminList');
            adminList.innerHTML = admins.map(admin => `
                <span class="bg-bg-elevated border border-bg-tertiary px-3 py-1 rounded-full text-sm">${escapeHtml(admin)}</span>
            `).join('');
        }

        function openEditCommunityModal() {
            document.getElementById('editCommunityName').value = currentCommunity;
            document.getElementById('editCommunityDescription').value = document.getElementById('communityDescription').textContent;
            document.getElementById('editCommunityModal').classList.remove('hidden');
        }

        function closeEditCommunityModal() {
            document.getElementById('editCommunityModal').classList.add('hidden');
        }

        async function saveCommunityChanges() {
            const name = document.getElementById('editCommunityName').value.trim();
            const description = document.getElementById('editCommunityDescription').value.trim();
            const password = document.getElementById('editCommunityPassword').value.trim();

            try {
                const response = await fetch('/api/community/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ community_name: currentCommunity, new_name: name, new_description: description, nickname: currentUser, password })
                });

                if (response.ok) {
                    closeEditCommunityModal();
                    loadCommunity();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to update community');
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        async function addAdmin() {
            const nickname = document.getElementById('addAdminNickname').value.trim();
            const password = document.getElementById('addAdminPassword').value.trim();

            if (!nickname || !password) {
                alert('Nickname and password are required');
                return;
            }

            try {
                const response = await fetch('/api/community-admins/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ community_name: currentCommunity, admin_nickname: nickname, nickname: currentUser, password })
                });

                if (response.ok) {
                    document.getElementById('addAdminNickname').value = '';
                    document.getElementById('addAdminPassword').value = '';
                    checkAdmin();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to add admin');
                }
            } catch (error) {
                alert('Connection error');
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const storedUser = localStorage.getItem('ffaf_nickname');
            const storedAuth = localStorage.getItem('ffaf_authenticated');
            
            if (storedUser && storedAuth === 'true') {
                currentUser = storedUser;
                isAuthenticated = true;
            }
            
            updateAuthUI();
            loadCommunity();
        });
    </script>
</body>
</html>
