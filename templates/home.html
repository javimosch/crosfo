<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crosfo — Cross-Follow Platform for Communities</title>
    <meta name="description" content="Boost your social presence with cross-follows within your existing community. Help each other out by following and liking each other's content.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300B4D8'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00B4D8',
                        'primary-hover': '#0095B8',
                        'primary-subtle': 'rgba(0, 180, 216, 0.1)',
                        bg: {
                            primary: '#FAFAFA',
                            secondary: '#F5F5F5',
                            tertiary: '#E5E5E5',
                            elevated: '#FFFFFF',
                        },
                        text: {
                            primary: '#1A1A1A',
                            secondary: '#666666',
                            tertiary: '#999999',
                        },
                    },
                    fontFamily: {
                        sans: ['SF Pro Display', 'Geist Sans', 'Helvetica Neue', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['Geist Mono', 'SF Mono', 'Menlo', 'Consolas', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-bg-primary text-text-primary leading-relaxed min-h-screen">
    <div class="container max-w-6xl mx-auto p-16">
        <nav class="flex justify-between items-center mb-12 pb-6 border-b border-bg-tertiary">
            <div class="flex items-center gap-4">
                <a href="/home" class="text-xl font-semibold tracking-wide bg-gradient-to-r from-primary to-primary-hover bg-clip-text text-transparent">Crosfo</a>
                <span class="text-sm text-primary font-semibold">Home</span>
                <a href="/communities" class="text-sm text-text-secondary hover:text-primary transition-colors">Communities</a>
                <a href="/stats" class="text-sm text-text-secondary hover:text-primary transition-colors">Stats</a>
                <a href="/users" class="text-sm text-text-secondary hover:text-primary transition-colors">Users</a>
            </div>
        </nav>

        <main>
            <section class="hero mb-16 relative bg-bg-secondary min-h-[400px] flex items-center">
                <div class="hero-content relative z-10">
                    <h1 class="text-6xl font-bold tracking-tighter mb-6 bg-gradient-to-r from-primary to-primary-hover bg-clip-text text-transparent">Crosfo</h1>
                    <p class="text-lg text-text-secondary max-w-2xl">Boost your social presence with cross-follows within your existing community. Help each other out by following and liking each other's content to grow your audiences together.</p>
                </div>
            </section>
        </main>

        <footer class="footer mt-16 pt-8 border-t border-bg-tertiary">
            <p class="text-sm text-text-secondary">&copy; 2024 Crosfo. Built for communities.</p>
            <div class="footer-links flex gap-4 mt-2 flex-wrap">
                <a href="/privacy" class="text-sm text-text-secondary hover:text-primary transition-colors">Privacy Policy</a>
                <a href="/terms" class="text-sm text-text-secondary hover:text-primary transition-colors">Terms of Service</a>
                <a href="https://github.com/javimosch/crosfo" target="_blank" rel="noopener" class="text-sm text-text-secondary hover:text-primary transition-colors">GitHub</a>
            </div>
        </footer>
    </div>
</body>
</html>
