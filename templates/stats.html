<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crosfo — Stats</title>
    <meta name="description" content="Community leaderboard — see who gives and receives the most thumbs up.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300B4D8'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00B4D8',
                        'primary-hover': '#0095B8',
                        'primary-subtle': 'rgba(0, 180, 216, 0.1)',
                        bg: {
                            primary: '#FAFAFA',
                            secondary: '#F5F5F5',
                            tertiary: '#E5E5E5',
                            elevated: '#FFFFFF',
                        },
                        text: {
                            primary: '#1A1A1A',
                            secondary: '#666666',
                            tertiary: '#999999',
                        },
                        red: '#C62828',
                        'red-bg': '#FFEBEE',
                        'red-border': '#FFCDD2',
                        orange: '#E65100',
                        'orange-bg': '#FFF3E0',
                        'orange-border': '#FFE0B2',
                        green: '#2E7D32',
                        'green-bg': '#E8F5E9',
                        'green-border': '#C8E6C9',
                    },
                    fontFamily: {
                        sans: ['SF Pro Display', 'Helvetica Neue', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['Geist Mono', 'SF Mono', 'Menlo', 'Consolas', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-bg-primary text-text-primary min-h-screen">
<div class="container max-w-4xl mx-auto p-12">
    <nav class="flex justify-between items-center mb-10 pb-5 border-b border-bg-tertiary">
        <div class="flex items-center gap-4">
            <a href="/" class="text-lg font-semibold tracking-wide bg-gradient-to-r from-primary to-primary-hover bg-clip-text text-transparent">Crosfo</a>
            <a href="/" class="text-sm text-text-secondary hover:text-primary transition-colors">← Communities</a>
            <span class="text-sm font-semibold text-primary">Stats</span>
        </div>
    </nav>

    <div class="page-header mb-8 flex justify-between items-end flex-wrap gap-4">
        <div>
            <h1 class="page-title text-4xl font-bold tracking-tighter">Stats</h1>
            <p class="page-subtitle text-sm text-text-secondary mt-2">Who gives more thumbs than they receive — and who owes a favour?</p>
        </div>
        <select class="filter-select px-3 py-2 border border-bg-tertiary rounded-lg text-sm bg-bg-elevated text-text-primary cursor-pointer focus:outline-none focus:border-primary" id="communityFilter" onchange="applyFilter()">
            <option value="">All communities</option>
        </select>
    </div>

    <div class="legend flex gap-5 mb-6 flex-wrap">
        <div class="legend-item flex items-center gap-2 text-xs text-text-secondary"><span class="legend-dot green w-2.5 h-2.5 rounded-full bg-green"></span>Giving more (diff &gt; 5)</div>
        <div class="legend-item flex items-center gap-2 text-xs text-text-secondary"><span class="legend-dot orange w-2.5 h-2.5 rounded-full bg-orange"></span>Balanced (diff ≤ 5)</div>
        <div class="legend-item flex items-center gap-2 text-xs text-text-secondary"><span class="legend-dot red w-2.5 h-2.5 rounded-full bg-red"></span>Receiving more (diff &lt; −5)</div>
    </div>

    <div id="loadingState" class="state-message">Loading stats…</div>
    <div id="statsContent" class="hidden">
        <div class="users-list flex flex-col gap-3 mb-12" id="usersList"></div>
        <div class="champions-section border-t-2 border-bg-tertiary pt-8 hidden" id="championsSection">
            <div class="champions-title text-xl font-bold tracking-wide flex items-center gap-2 mb-2">🏆 Top 5 Champions</div>
            <p class="champions-subtitle text-sm text-text-secondary mb-6">Users who gave the most thumbs relative to what they received.</p>
            <div class="champions-grid grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4" id="championsGrid"></div>
        </div>
    </div>
    <div id="errorState" class="state-message hidden text-red-600"></div>
</div>

<script>
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const exampleUsers = [
        'alice_dev', 'bob_design', 'charlie_code', 'diana_startup', 'eve_writer',
        'frank_tech', 'grace_ai', 'henry_web', 'iris_data', 'jack_mobile',
        'kate_cloud', 'leo_ml', 'maya_design', 'noah_backend', 'olivia_product',
        'peter_devops', 'quinn_security', 'rachel_frontend', 'sam_fullstack'
    ];

    function isExampleUser(nickname) {
        return exampleUsers.includes(nickname);
    }

    let allCommunities = [];

    async function loadStats(communityFilter) {
        document.getElementById('loadingState').classList.remove('hidden');
        document.getElementById('statsContent').classList.add('hidden');
        document.getElementById('errorState').classList.add('hidden');

        try {
            const params = communityFilter ? `?community=${encodeURIComponent(communityFilter)}` : '';
            const res = await fetch(`/api/stats${params}`);
            if (!res.ok) throw new Error('Failed to load');
            const data = await res.json();

            if (allCommunities.length === 0 && data.communities) {
                allCommunities = data.communities;
                const sel = document.getElementById('communityFilter');
                allCommunities.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.name;
                    opt.textContent = c.name;
                    if (c.name === communityFilter) opt.selected = true;
                    sel.appendChild(opt);
                });
            }

            renderStats(data);
        } catch(e) {
            document.getElementById('loadingState').classList.add('hidden');
            const errEl = document.getElementById('errorState');
            errEl.classList.remove('hidden');
            errEl.textContent = `Could not load stats: ${e.message}`;
        }
    }

    function renderStats(data) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('statsContent').classList.remove('hidden');

        const users = data.users || [];
        const currentCommunity = data.filter || '';

        if (users.length === 0) {
            document.getElementById('usersList').innerHTML = '<div class="state-message">No activity yet — start giving thumbs up!</div>';
        } else {
            document.getElementById('usersList').innerHTML = users.map(u => {
                const diffSign = u.diff > 0 ? '+' : '';
                const href = currentCommunity
                    ? `/c/${encodeURIComponent(currentCommunity)}/user/${encodeURIComponent(u.nickname)}`
                    : '#';
                const tag = currentCommunity ? 'a' : 'div';
                const colorClasses = {
                    red: 'bg-red-bg border-red-border',
                    orange: 'bg-orange-bg border-orange-border',
                    green: 'bg-green-bg border-green-border'
                };
                const dotColor = {
                    red: 'bg-red',
                    orange: 'bg-orange',
                    green: 'bg-green'
                };
                const badgeColor = {
                    red: 'bg-red text-white',
                    orange: 'bg-orange text-white',
                    green: 'bg-green text-white'
                };
                return `
                    <${tag} class="user-row flex items-center gap-4 px-4 py-3 rounded-lg border ${colorClasses[u.color]} hover-lift transition-all ${currentCommunity ? '' : 'pointer-events-none'}" ${currentCommunity ? `href="${href}"` : ''}>
                        <span class="color-dot w-2.5 h-2.5 rounded-full flex-shrink-0 ${dotColor[u.color]}"></span>
                        <span class="user-nickname font-semibold text-sm flex-1">@${escapeHtml(u.nickname)}${isExampleUser(u.nickname) ? '<span class="ml-2 text-xs bg-bg-secondary text-text-secondary px-2 py-1 rounded" title="Mock data for demonstration">EXAMPLE</span>' : ''}</span>
                        <div class="user-stats flex gap-5 text-xs">
                            <div class="stat-item flex flex-col items-center gap-0.5">
                                <span class="stat-label text-text-tertiary uppercase tracking-widest text-[10px]">Given</span>
                                <span class="stat-value font-semibold">${u.thumbs_given}</span>
                            </div>
                            <div class="stat-item flex flex-col items-center gap-0.5">
                                <span class="stat-label text-text-tertiary uppercase tracking-widest text-[10px]">Received</span>
                                <span class="stat-value font-semibold">${u.thumbs_received}</span>
                            </div>
                        </div>
                        <span class="diff-badge text-xs font-bold px-2 py-0.5 rounded-full ${badgeColor[u.color]}">${diffSign}${u.diff}</span>
                    </${tag}>
                `;
            }).join('');
        }

        const top5 = data.top5_green || [];
        const champSection = document.getElementById('championsSection');
        if (top5.length > 0) {
            champSection.classList.remove('hidden');
            const medals = ['🥇','🥈','🥉','4','5'];
            document.getElementById('championsGrid').innerHTML = top5.map((u, i) => {
                const href = currentCommunity
                    ? `/c/${encodeURIComponent(currentCommunity)}/user/${encodeURIComponent(u.nickname)}`
                    : '#';
                const tag = currentCommunity ? 'a' : 'div';
                return `
                    <${tag} class="champion-card bg-green-bg border border-green-border rounded-lg p-5 text-center transition-all hover-lift ${currentCommunity ? '' : 'pointer-events-none'}" ${currentCommunity ? `href="${href}"` : ''}>
                        <div class="champion-rank text-xs text-text-tertiary mb-2 font-semibold uppercase tracking-widest">${medals[i] || (i+1)}</div>
                        <div class="champion-nick text-sm font-bold mb-3">@${escapeHtml(u.nickname)}${isExampleUser(u.nickname) ? '<span class="ml-2 text-xs bg-bg-secondary text-text-secondary px-2 py-1 rounded" title="Mock data for demonstration">EXAMPLE</span>' : ''}</div>
                        <div class="champion-diff text-2xl font-bold text-green">+${u.diff}</div>
                        <div class="champion-diff-label text-xs text-text-secondary">net thumbs given</div>
                    </${tag}>
                `;
            }).join('');
        } else {
            champSection.classList.add('hidden');
        }
    }

    function applyFilter() {
        const val = document.getElementById('communityFilter').value;
        loadStats(val);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const initCommunity = urlParams.get('community') || '';
    if (initCommunity) {
        document.getElementById('communityFilter').value = initCommunity;
    }
    loadStats(initCommunity);
</script>
</body>
</html>
