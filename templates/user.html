<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crosfo — User Profile</title>
    <meta name="description" content="View a member's social links and track your reciprocity.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300B4D8'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00B4D8',
                        'primary-hover': '#0095B8',
                        'primary-subtle': 'rgba(0, 180, 216, 0.1)',
                        bg: {
                            primary: '#FAFAFA',
                            secondary: '#F5F5F5',
                            tertiary: '#E5E5E5',
                            elevated: '#FFFFFF',
                        },
                        text: {
                            primary: '#1A1A1A',
                            secondary: '#666666',
                            tertiary: '#999999',
                        },
                    },
                    fontFamily: {
                        sans: ['SF Pro Display', 'Helvetica Neue', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['Geist Mono', 'SF Mono', 'Menlo', 'Consolas', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-bg-primary text-text-primary min-h-screen">
<div class="container max-w-4xl mx-auto p-12">
    <nav class="flex justify-between items-center mb-10 pb-5 border-b border-bg-tertiary">
        <div class="flex items-center gap-4">
            <a href="/" class="text-lg font-semibold tracking-wide bg-gradient-to-r from-primary to-primary-hover bg-clip-text text-transparent">Crosfo</a>
            <a id="backToCommunity" href="/" class="text-sm text-text-secondary hover:text-primary transition-colors">← Back to community</a>
            <a href="/stats" class="text-sm text-text-secondary hover:text-primary transition-colors">Stats</a>
        </div>
    </nav>

    <div id="loadingState" class="state-message">Loading profile…</div>
    <div id="profileContent" class="hidden">
        <div class="profile-header mb-8">
            <h1 class="profile-title text-4xl font-bold tracking-tighter mb-2" id="profileNickname"></h1>
            <p class="profile-subtitle text-sm text-text-secondary">
                Member of <a id="communityLink" href="#" class="text-primary hover:underline">—</a>
            </p>
        </div>

        <div class="reciprocity-bar bg-bg-elevated border border-bg-tertiary rounded-xl p-5 mb-8 flex items-center gap-6 flex-wrap shadow-sm" id="reciprocityBar">
            <div>
                <div class="recip-label text-xs font-semibold uppercase tracking-widest text-text-tertiary mb-1">You gave</div>
                <div class="recip-value given text-2xl font-bold text-primary" id="thumbsGiven">—</div>
            </div>
            <div class="recip-divider w-px h-10 bg-bg-tertiary"></div>
            <div>
                <div class="recip-label text-xs font-semibold uppercase tracking-widest text-text-tertiary mb-1">They gave you</div>
                <div class="recip-value received text-2xl font-bold text-green-600" id="thumbsReceived">—</div>
            </div>
            <div class="recip-cta ml-auto hidden" id="recipCta">
                <a id="returnFavourBtn" href="#" class="btn btn-accent bg-primary text-white px-5 py-3 rounded-lg font-medium hover-lift active-press">Return the favour →</a>
            </div>
        </div>

        <div class="section-title text-sm font-semibold uppercase tracking-widest text-text-tertiary mb-4">Social Links</div>
        <div class="links-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-12" id="linksGrid"></div>
    </div>
    <div id="errorState" class="state-message hidden text-red-600"></div>
</div>

<script>
    const parts = window.location.pathname.split('/').filter(Boolean);
    const communityName = parts[1] || '';
    const nickname = parts[3] || '';
    const viewer = localStorage.getItem('crosfo_nickname') || '';

    document.getElementById('backToCommunity').href = `/c/${communityName}`;
    document.getElementById('communityLink').href = `/c/${communityName}`;
    document.getElementById('communityLink').textContent = communityName;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadProfile() {
        try {
            const params = new URLSearchParams({ community: communityName, nickname, viewer });
            const res = await fetch(`/api/user-profile?${params}`);
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || 'Not found');
            }
            const data = await res.json();
            renderProfile(data);
        } catch(e) {
            document.getElementById('loadingState').classList.add('hidden');
            const errEl = document.getElementById('errorState');
            errEl.classList.remove('hidden');
            errEl.textContent = `Could not load profile: ${e.message}`;
        }
    }

    function renderProfile(data) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('profileContent').classList.remove('hidden');

        document.title = `${nickname} — Crosfo`;
        document.getElementById('profileNickname').textContent = `@${nickname}`;

        document.getElementById('thumbsGiven').textContent = data.thumbs_given ?? 0;
        document.getElementById('thumbsReceived').textContent = data.thumbs_received ?? 0;

        if (viewer && viewer !== nickname) {
            const given = data.thumbs_given ?? 0;
            const received = data.thumbs_received ?? 0;
            if (received > given) {
                const cta = document.getElementById('recipCta');
                const btn = document.getElementById('returnFavourBtn');
                btn.href = `/c/${communityName}`;
                btn.title = `You gave ${given}, they gave ${received} — time to return the favour!`;
                cta.classList.remove('hidden');
            }
        }

        const grid = document.getElementById('linksGrid');
        const links = data.links || [];
        if (links.length === 0) {
            grid.innerHTML = '<div class="state-message">No links found for this community.</div>';
            return;
        }
        grid.innerHTML = links.map(link => `
            <div class="link-card bg-bg-elevated border border-bg-tertiary rounded-lg p-5 hover-lift">
                <div class="link-platform text-xs font-semibold uppercase tracking-widest text-text-secondary mb-2">${escapeHtml(link.platform)}</div>
                <div class="link-url text-sm break-all mb-3"><a href="${escapeHtml(link.url)}" target="_blank" rel="noopener" class="text-text-primary hover:text-primary transition-colors">${escapeHtml(link.url)}</a></div>
                <div class="link-thumbs text-xs text-text-secondary"><strong id="tc-${link.id}">…</strong> thumbs up</div>
            </div>
        `).join('');

        links.forEach(async link => {
            try {
                const r = await fetch(`/api/thumbs-up?link_id=${link.id}`);
                const thumbs = await r.json();
                const el = document.getElementById(`tc-${link.id}`);
                if (el) el.textContent = Array.isArray(thumbs) ? thumbs.length : 0;
            } catch(_) {}
        });
    }

    loadProfile();
</script>
</body>
</html>
