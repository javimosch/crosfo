<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Crosfo</title>
    <meta name="description" content="View all users on Crosfo.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300B4D8'/%3E%3Ctext x='50' y='65' font-size='40' text-anchor='middle' fill='white' font-weight='bold'%3EC%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00B4D8',
                        'primary-hover': '#0095B8',
                        'primary-subtle': 'rgba(0, 180, 216, 0.1)',
                        bg: {
                            primary: '#FAFAFA',
                            secondary: '#F5F5F5',
                            tertiary: '#E5E5E5',
                            elevated: '#FFFFFF',
                        },
                        text: {
                            primary: '#1A1A1A',
                            secondary: '#666666',
                            tertiary: '#999999',
                        },
                    },
                    fontFamily: {
                        sans: ['SF Pro Display', 'Geist Sans', 'Helvetica Neue', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['Geist Mono', 'SF Mono', 'Menlo', 'Consolas', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-bg-primary text-text-primary leading-relaxed min-h-screen">
    <div class="container max-w-7xl mx-auto p-12">
        <nav class="flex justify-between items-center mb-12 pb-6 border-b border-bg-tertiary">
            <div class="flex items-center gap-4">
                <a href="/" class="text-lg font-semibold tracking-wide bg-gradient-to-r from-primary to-primary-hover bg-clip-text text-transparent">Crosfo</a>
                <a href="/stats" class="text-sm text-text-secondary hover:text-primary transition-colors">Stats</a>
                <span class="text-sm text-primary font-semibold">Users</span>
            </div>
        </nav>

        <main>
            <h1 class="text-4xl font-bold tracking-tighter mb-8">All Users</h1>
            <div id="loadingState" class="text-text-secondary">Loading users...</div>
            <div id="usersGrid" class="users-grid hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <footer class="footer mt-12 pt-6 border-t border-bg-tertiary">
        <p class="text-sm text-text-secondary">&copy; 2024 Crosfo. Built for solo entrepreneurs.</p>
        <div class="footer-links flex gap-4 mt-2 flex-wrap">
            <a href="/privacy" class="text-sm text-text-secondary hover:text-primary transition-colors">Privacy Policy</a>
            <a href="/terms" class="text-sm text-text-secondary hover:text-primary transition-colors">Terms of Service</a>
            <a href="https://github.com/javimosch/crosfo" target="_blank" rel="noopener" class="text-sm text-text-secondary hover:text-primary transition-colors">GitHub</a>
        </div>
    </footer>

    <script>
        const exampleUsers = [
            'alice_dev', 'bob_design', 'charlie_code', 'diana_startup', 'eve_writer',
            'frank_tech', 'grace_ai', 'henry_web', 'iris_data', 'jack_mobile',
            'kate_cloud', 'leo_ml', 'maya_design', 'noah_backend', 'olivia_product',
            'peter_devops', 'quinn_security', 'rachel_frontend', 'sam_fullstack'
        ];

        function isExampleUser(nickname) {
            return exampleUsers.includes(nickname);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                if (!response.ok) {
                    throw new Error('Failed to load users');
                }
                const users = await response.json();
                renderUsers(users);
            } catch (error) {
                document.getElementById('loadingState').textContent = 'Failed to load users';
            }
        }

        async function renderUsers(users) {
            document.getElementById('loadingState').classList.add('hidden');
            const grid = document.getElementById('usersGrid');
            
            if (!users || users.length === 0) {
                grid.innerHTML = '<div class="text-text-secondary col-span-3 text-center py-12">No users yet</div>';
                grid.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            
            // Fetch all user entries and flatten them
            const allEntries = [];
            for (const user of users) {
                try {
                    const response = await fetch(`/api/user-entries?nickname=${encodeURIComponent(user.nickname)}`);
                    if (!response.ok) continue;
                    const data = await response.json();
                    const entries = data.entries || [];
                    entries.forEach(entry => {
                        allEntries.push({
                            user,
                            entry,
                            community: entry.community_name || 'Unknown'
                        });
                    });
                } catch (e) {
                    // Skip user if fetch fails
                }
            }

            if (allEntries.length === 0) {
                grid.innerHTML = '<div class="text-text-secondary col-span-3 text-center py-12">No entries yet</div>';
                return;
            }

            grid.innerHTML = allEntries.map(({ user, entry, community }) => `
                <div class="entry-card bg-bg-elevated border border-bg-tertiary rounded-lg p-4 hover-lift transition-all">
                    <div class="entry-header mb-3">
                        <span class="entry-nickname text-sm font-semibold text-text-primary">@${escapeHtml(user.nickname)}${isExampleUser(user.nickname) ? '<span class="ml-2 text-xs bg-bg-secondary text-text-secondary px-2 py-0.5 rounded" title="Mock data for demonstration">EXAMPLE</span>' : ''}</span>
                        <span class="entry-community text-xs text-text-tertiary ml-auto">${escapeHtml(community)}</span>
                    </div>
                    ${entry.links && entry.links.length > 0 ? `
                        <div class="links-list flex flex-col gap-2">
                            ${entry.links.slice(0, 2).map(link => `
                                <div class="link-item bg-bg-secondary border border-bg-tertiary rounded p-2">
                                    <p class="link-platform text-xs font-semibold uppercase tracking-widest text-text-tertiary mb-1">${escapeHtml(link.platform)}</p>
                                    <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener" class="link-url text-xs break-all text-text-primary hover:text-primary transition-colors">${escapeHtml(link.url)}</a>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<p class="text-xs text-text-tertiary">No links</p>'}
                </div>
            `).join('');
        }

        loadUsers();
    </script>
</body>
</html>
